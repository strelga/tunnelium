name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o tunnelium-linux-amd64 ./cmd/tunnelium
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o tunnelium-darwin-amd64 ./cmd/tunnelium
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o tunnelium-darwin-arm64 ./cmd/tunnelium
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tunnelium-linux-amd64
            tunnelium-darwin-amd64
            tunnelium-darwin-arm64
